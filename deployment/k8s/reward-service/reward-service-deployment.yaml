apiVersion: apps/v1
kind: Deployment
metadata:
  name: reward-service
  namespace: loyalty-sphere
  labels:
    app: reward-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: reward-service
  template:
    metadata:
      labels:
        app: reward-service
        version: v1
    spec:
      containers:
      - name: reward-service
        image: ghcr.io/mostafa-said7/national-bank/reward-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        env:
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: loyalty-sphere-config
              key: ASPNETCORE_ENVIRONMENT
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: loyalty-sphere-secrets
              key: ConnectionStrings__DefaultConnection
        - name: ConnectionStrings__Redis
          valueFrom:
            secretKeyRef:
              name: loyalty-sphere-secrets
              key: ConnectionStrings__Redis
        - name: ConnectionStrings__RabbitMQ
          valueFrom:
            secretKeyRef:
              name: loyalty-sphere-secrets
              key: ConnectionStrings__RabbitMQ
        envFrom:
        - configMapRef:
            name: loyalty-sphere-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: reward-service
  namespace: loyalty-sphere
  labels:
    app: reward-service
spec:
  selector:
    app: reward-service
  ports:
  - port: 80
    targetPort: 5000
    protocol: TCP
    name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: reward-service-hpa
  namespace: loyalty-sphere
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: reward-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
