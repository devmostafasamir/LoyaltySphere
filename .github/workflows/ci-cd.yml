name: LoyaltySphere CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'

jobs:
  # ============================================
  # Backend Build & Test
  # ============================================
  backend-build-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build solution
        run: dotnet build --configuration Release
        working-directory: src/Services/RewardService

      - name: Run unit tests
        run: dotnet test --configuration Release
        working-directory: tests/LoyaltySphere.RewardService.Tests

  # ============================================
  # Frontend Build & Test
  # ============================================
  frontend-build-test:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Web/loyalty-sphere-ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/Web/loyalty-sphere-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build
