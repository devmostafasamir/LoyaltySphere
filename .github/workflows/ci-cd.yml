name: LoyaltySphere CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # Backend Build & Test
  # ============================================
  backend-build-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-backend
          path: '**/TestResults/**/*.trx'

      - name: Upload code coverage
        uses: codecov/codecov-action@v3
        with:
          files: '**/coverage.cobertura.xml'
          flags: backend
          name: backend-coverage

  # ============================================
  # Frontend Build & Test
  # ============================================
  frontend-build-test:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Web/loyalty-sphere-ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/Web/loyalty-sphere-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

      - name: Build production
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/Web/loyalty-sphere-ui/dist

  # ============================================
  # Security Scanning
  # ============================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-build-test, frontend-build-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

  # ============================================
  # Docker Build & Push
  # ============================================
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-build-test, frontend-build-test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    strategy:
      matrix:
        service:
          - name: reward-service
            context: .
            dockerfile: src/Services/RewardService/Dockerfile
          - name: frontend
            context: src/Web/loyalty-sphere-ui
            dockerfile: src/Web/loyalty-sphere-ui/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ============================================
  # Deploy to Kubernetes (Production)
  # ============================================
  deploy-kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://loyaltysphere.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f deployment/k8s/namespace.yaml
          kubectl apply -f deployment/k8s/configmap.yaml
          kubectl apply -f deployment/k8s/secrets.yaml
          kubectl apply -f deployment/k8s/postgresql/
          kubectl apply -f deployment/k8s/rabbitmq/
          kubectl apply -f deployment/k8s/redis/
          kubectl apply -f deployment/k8s/reward-service/
          kubectl apply -f deployment/k8s/frontend/

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/reward-service -n loyalty-sphere --timeout=5m
          kubectl rollout status deployment/frontend -n loyalty-sphere --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -n loyalty-sphere
          kubectl get services -n loyalty-sphere
          kubectl get ingress -n loyalty-sphere

  # ============================================
  # Smoke Tests (Post-Deployment)
  # ============================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-kubernetes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for services to be ready
        run: sleep 30

      - name: Test API Gateway health
        run: |
          curl -f https://api.loyaltysphere.example.com/health || exit 1

      - name: Test Reward Service health
        run: |
          curl -f https://api.loyaltysphere.example.com/api/rewards/health || exit 1

      - name: Test Frontend
        run: |
          curl -f https://loyaltysphere.example.com || exit 1

      - name: Run API integration tests
        run: |
          # Add your integration test commands here
          echo "Running integration tests..."

  # ============================================
  # Notification
  # ============================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [backend-build-test, frontend-build-test, security-scan, docker-build-push, deploy-kubernetes, smoke-tests]
    if: always()

    steps:
      - name: Send Slack notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            LoyaltySphere CI/CD Pipeline
            Status: ${{ job.status }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

# ============================================
# REQUIRED SECRETS:
# ============================================
# - GITHUB_TOKEN (automatically provided)
# - KUBE_CONFIG (base64 encoded kubeconfig)
# - SLACK_WEBHOOK (optional, for notifications)
# ============================================
