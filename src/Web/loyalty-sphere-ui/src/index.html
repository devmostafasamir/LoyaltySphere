<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LoyaltySphere - Premium Loyalty & Rewards Platform</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Multi-tenant loyalty and rewards platform with real-time points tracking">
  <meta name="theme-color" content="#9F1239">
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Preconnect to API -->
  <link rel="preconnect" href="http://localhost:5000">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-950 text-white antialiased">
  <!-- Loading Spinner -->
  <div id="app-loading" style="
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #020617;
    z-index: 9999;
  ">
    <div style="text-align: center;">
      <div style="
        width: 64px;
        height: 64px;
        border: 4px solid #1e293b;
        border-top-color: #9F1239;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 16px;
      "></div>
      <p style="color: #94a3b8; font-family: 'Inter', sans-serif;">Loading LoyaltySphere...</p>
    </div>
  </div>
  
  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  
  <!-- Angular App Root -->
  <app-root></app-root>
  
  <script>
    // Remove loading spinner when Angular bootstraps
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const loader = document.getElementById('app-loading');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.3s';
          setTimeout(() => loader.remove(), 300);
        }
      }, 500);
    });
  </script>
</body>
</html>
